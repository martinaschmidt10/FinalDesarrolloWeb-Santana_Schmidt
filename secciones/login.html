<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - TeamUP!</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Anybody:wght@600;800&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <main class="auth-wrapper">
    <div class="auth-card">

      <a href="../index.html" class="auth-logo text-decoration-none">
        TeamUP<span class="text-accent">!</span>
      </a>
      <p class="auth-subtitle mb-4">LOGIN TO THE GRID</p>

      <!-- Banner de feedback general (lo muestra/oculta el JS) -->
      <div class="form-feedback feedback-success" id="loginFeedback" role="alert" aria-live="polite"></div>

      <!-- novalidate: apagamos la validación nativa del navegador para
           controlar nosotros mismos los mensajes de error con JS -->
      <form id="formLogin" novalidate>

        <div class="mb-3">
          <label for="playerId" class="form-label-game">
            <span class="label-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="12" height="10" fill="none" viewBox="0 0 12 10"><path fill="#00f0ff" d="M7 5.25h2.917V4.083H7zM7 3.5h2.917V2.333H7zM1.75 7h4.667v-.32q0-.657-.642-1.044-.642-.386-1.692-.386t-1.691.386T1.75 6.68zm2.333-2.333q.482 0 .824-.343.343-.343.343-.824t-.343-.824a1.12 1.12 0 0 0-.824-.343q-.48 0-.824.343a1.12 1.12 0 0 0-.342.824q0 .48.342.824.344.342.824.343M1.167 9.333q-.482 0-.824-.342A1.12 1.12 0 0 1 0 8.167v-7Q0 .685.343.343.685 0 1.167 0H10.5q.48 0 .824.343.342.342.343.824v7q0 .48-.343.824a1.12 1.12 0 0 1-.824.342zm0-1.166H10.5v-7H1.167zm0 0v-7z"/></svg>
            </span>
            Player ID
          </label>
          <input type="text" class="form-control-game" id="playerId"
                 name="playerId" placeholder="Enter username or ID"
                 aria-describedby="playerIdError">
          <p class="form-error-text" id="playerIdError">Ingresá tu Player ID.</p>
        </div>

        <div class="mb-3">
          <label for="accessKey" class="form-label-game">
            <span class="label-icon">
             <svg xmlns="http://www.w3.org/2000/svg" width="13" height="7" fill="none" viewBox="0 0 13 7"><path fill="#00f0ff" d="M3.5 7Q2.042 7 1.02 5.98 0 4.957 0 3.5t1.02-2.48Q2.043 0 3.5 0q.963 0 1.765.481.801.482 1.268 1.269h6.3v3.5h-1.166V7h-3.5V5.25H6.533a3.6 3.6 0 0 1-1.268 1.269A3.37 3.37 0 0 1 3.5 7m0-1.167q.963 0 1.546-.59t.7-1.16h3.587v1.75H10.5v-1.75h1.167V2.917H5.746q-.117-.57-.7-1.16-.584-.59-1.546-.59t-1.648.685A2.25 2.25 0 0 0 1.167 3.5q0 .963.685 1.648a2.25 2.25 0 0 0 1.648.685m0-1.166q.48 0 .824-.343.342-.343.343-.824 0-.48-.343-.824a1.12 1.12 0 0 0-.824-.343q-.48 0-.824.343a1.12 1.12 0 0 0-.343.824q0 .48.343.824.343.342.824.343"/></svg>
            </span>
            Access Key
          </label>
          <div class="password-field">
            <input type="password" class="form-control-game" id="accessKey"
                   name="accessKey" placeholder="••••••••••••"
                   aria-describedby="accessKeyError">
            <button type="button" class="password-toggle" id="togglePassword"
                    aria-label="Mostrar u ocultar contraseña">👁</button>
          </div>
          <p class="form-error-text" id="accessKeyError">Ingresá tu contraseña.</p>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check form-check-game">
            <input class="form-check-input" type="checkbox" id="rememberSession">
            <label class="form-check-label" for="rememberSession">Remember Session</label>
          </div>
          <a href="#" class="form-check-game text-decoration-none">Forgot Credentials?</a>
        </div>

        <button type="submit" class="btn btn-accent w-100">LOG IN →</button>

        <hr class="auth-divider">

        <p class="text-center form-check-game mb-3">
          New user? <a href="registro.html">Create Profile</a>
        </p>

        <div class="social-row">
          <a href="#" class="social-btn" aria-label="Continuar con GitHub">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.48 2 2 6.58 2 12.25c0 4.5 2.87 8.32 6.84 9.67.5.1.68-.22.68-.49 0-.24-.01-1.04-.01-1.88-2.78.62-3.37-1.2-3.37-1.2-.45-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.57 2.36 1.12 2.93.85.09-.66.34-1.12.62-1.37-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.31.1-2.73 0 0 .84-.27 2.76 1.05A9.4 9.4 0 0 1 12 6.84c.85 0 1.71.12 2.51.34 1.92-1.32 2.76-1.05 2.76-1.05.55 1.42.2 2.47.1 2.73.64.72 1.03 1.63 1.03 2.75 0 3.94-2.35 4.81-4.58 5.06.36.32.67.94.67 1.9 0 1.37-.01 2.48-.01 2.81 0 .27.18.6.69.49A10.02 10.02 0 0 0 22 12.25C22 6.58 17.52 2 12 2z"/>
            </svg>
          </a>
          <a href="#" class="social-btn" aria-label="Continuar con Twitter / X">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18.9 2H22l-7.6 8.7L23 22h-6.9l-5.4-7.1L4.4 22H1.3l8.2-9.3L1 2h7l4.9 6.5L18.9 2z"/>
            </svg>
          </a>
        </div>

      </form>

      <div class="status-bar">
        <span><span class="status-dot">●</span> SYSTEM ONLINE: REGION NA_01</span>
        <span>BUILD V.9.4.6</span>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/script.js"></script>
</body>
</html>
